<template>
    <!-- Current lookup indicator -->
    <div class="slds-box slds-box_x-small slds-theme_info slds-var-m-bottom_medium">
        <span class="slds-text-body_small">
            Showing results for <strong>{componentName}</strong>
            <span class="slds-badge slds-badge_lightest slds-var-m-left_xx-small">{metadataType}</span>
        </span>
    </div>

    <!-- Warning if limit reached -->
    <template if:true={limitReached}>
        <div class="slds-notify slds-notify_alert slds-alert_warning slds-var-m-bottom_medium" role="alert">
            <span class="slds-assistive-text">warning</span>
            <h2>{warningMessage}</h2>
        </div>
    </template>

    <!-- Results header -->
    <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-var-m-bottom_small">
        <h2 class="slds-text-heading_small">
            <strong>{totalCount}</strong> references found
            <span class="slds-text-body_small slds-text-color_weak slds-var-m-left_xx-small">across {groupCount} metadata types</span>
        </h2>
        <div class="slds-grid slds-grid_vertical-align-center slds-gutters_x-small">
            <!-- View mode toggle -->
            <div class="view-toggle slds-button-group slds-var-m-right_x-small" role="group" aria-label="View mode">
                <template for:each={viewModeButtons} for:item="btn">
                    <lightning-button
                        key={btn.value}
                        label={btn.label}
                        variant={btn.variant}
                        data-mode={btn.value}
                        onclick={handleViewModeChange}>
                    </lightning-button>
                </template>
            </div>
            <!-- Blast Radius button -->
            <lightning-button
                label="Show Blast Radius"
                variant="brand-outline"
                icon-name="utility:graph"
                onclick={handleShowBlastRadius}>
            </lightning-button>
        </div>
    </div>

    <!-- Search within results (list mode only) -->
    <template if:true={isListView}>
        <div class="slds-var-m-bottom_small">
            <lightning-input
                type="search"
                label="Filter results"
                placeholder="Type to filter by component name..."
                variant="label-hidden"
                onchange={handleSearchInput}
                value={searchText}>
            </lightning-input>
            <template if:true={hasSearchFilter}>
                <p class="slds-text-body_small slds-text-color_weak slds-var-m-top_xx-small">
                    Showing {filteredResultCount} of {totalCount} results
                </p>
            </template>
        </div>

        <!-- Filter badges -->
        <div class="slds-var-m-bottom_medium">
            <template for:each={filterBadges} for:item="badge">
                <lightning-badge
                    key={badge.value}
                    label={badge.label}
                    data-value={badge.value}
                    onclick={handleFilterClick}
                    class={badge.badgeClass}>
                </lightning-badge>
            </template>
        </div>

        <!-- Accordion results -->
        <template for:each={filteredGroups} for:item="group">
            <div key={group.componentType} class="slds-card slds-var-m-bottom_x-small">
                <!-- Group header -->
                <div class="slds-grid slds-grid_vertical-align-center slds-var-p-around_small slds-border_bottom"
                     data-type={group.componentType}
                     role="button"
                     tabindex="0"
                     aria-label="Toggle {group.componentType} group"
                     onclick={handleToggleGroup}
                     onkeydown={handleToggleGroupKeydown}
                     style="cursor: pointer;">
                    <lightning-icon
                        icon-name={group.iconName}
                        size="small"
                        class="slds-var-m-right_small"
                        alternative-text="Metadata type">
                    </lightning-icon>
                    <span class="slds-text-title_caps slds-grow">{group.componentType}</span>
                    <lightning-badge label={group.count}></lightning-badge>
                    <lightning-icon
                        icon-name={group.chevronIcon}
                        size="x-small"
                        class="slds-var-m-left_small"
                        alternative-text="Expand or collapse section">
                    </lightning-icon>
                </div>

                <!-- Group records -->
                <template if:true={group.isExpanded}>
                    <template for:each={group.records} for:item="record">
                        <div key={record.key} class="slds-grid slds-grid_vertical-align-center slds-var-p-horizontal_medium slds-var-p-vertical_x-small slds-border_bottom">
                            <span class="slds-grow slds-truncate slds-text-link">
                                {record.metadataComponentName}
                            </span>
                            <template if:true={record.metadataComponentNamespace}>
                                <span class="slds-badge slds-badge_lightest slds-var-m-right_small">{record.metadataComponentNamespace}</span>
                            </template>
                            <template if:true={record.hasBadge}>
                                <lightning-badge label={record.badgeLabel} class="slds-var-m-right_small"></lightning-badge>
                            </template>
                            <template if:true={record.hasSetupUrl}>
                                <lightning-button-icon
                                    icon-name="utility:new_window"
                                    alternative-text="Open in Setup"
                                    title="Open in Setup"
                                    aria-label="Open in Setup"
                                    data-url={record.setupUrl}
                                    onclick={handleOpenSetup}
                                    size="small">
                                </lightning-button-icon>
                            </template>
                        </div>
                    </template>
                </template>
            </div>
        </template>
    </template>

    <!-- Graph mode: filter badges + D3 radial tree -->
    <template if:true={isGraphView}>
        <!-- Filter badges remain visible in graph mode -->
        <div class="slds-var-m-bottom_small">
            <template for:each={filterBadges} for:item="badge">
                <lightning-badge
                    key={badge.value}
                    label={badge.label}
                    data-value={badge.value}
                    onclick={handleFilterClick}
                    class={badge.badgeClass}>
                </lightning-badge>
            </template>
        </div>

        <!-- D3 container — lwc:dom="manual" required for SVG manipulation -->
        <div lwc:dom="manual" class="radial-tree-container"></div>
    </template>
</template>
