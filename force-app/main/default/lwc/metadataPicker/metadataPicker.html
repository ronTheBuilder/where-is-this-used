<template>
    <div class="slds-grid slds-wrap slds-gutters_small slds-var-m-bottom_medium">
        <!-- Metadata Type -->
        <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
            <c-searchable-combobox
                label="Metadata Type"
                value={metadataType}
                options={metadataTypeOptions}
                placeholder="Select type..."
                onchange={handleMetadataTypeChange}>
            </c-searchable-combobox>
        </div>

        <!-- Object picker (for fields, record types, etc.) -->
        <template if:true={showObjectPicker}>
            <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
                <c-searchable-combobox
                    label="Object"
                    value={selectedObject}
                    options={objectOptions}
                    placeholder="Search objects..."
                    onchange={handleObjectChange}>
                </c-searchable-combobox>
            </div>
        </template>

        <!-- Component picker (all types including Apex) -->
        <template if:true={showComponentPicker}>
            <div class={componentPickerColClass}>
                <c-searchable-combobox
                    label={componentLabel}
                    value={selectedComponent}
                    options={componentOptions}
                    placeholder={componentPlaceholder}
                    server-search={isApexClass}
                    onsearch={handleComponentSearch}
                    onchange={handleComponentChange}>
                </c-searchable-combobox>
            </div>
        </template>

        <!-- Search button -->
        <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12 slds-grid slds-grid_vertical-align-end">
            <lightning-button
                variant="brand"
                label="Find Usages"
                icon-name="utility:search"
                disabled={isSearchDisabled}
                onclick={handleSearch}
                class="slds-var-m-top_medium">
            </lightning-button>
        </div>
    </div>

    <!-- Recent searches -->
    <template if:true={hasRecentSearches}>
        <div class="slds-var-m-bottom_small">
            <div class="slds-grid slds-grid_vertical-align-center slds-var-m-bottom_xx-small">
                <span class="slds-text-title_caps slds-grow">Recent Searches</span>
                <lightning-button-icon
                    icon-name="utility:delete"
                    alternative-text="Clear recent searches"
                    title="Clear recent searches"
                    aria-label="Clear recent searches"
                    size="small"
                    onclick={handleClearRecent}>
                </lightning-button-icon>
            </div>
            <lightning-pill-container>
                <template for:each={recentSearches} for:item="recent">
                    <lightning-pill
                        key={recent.key}
                        label={recent.label}
                        data-key={recent.key}
                        onclick={handleRecentSearchClick}>
                    </lightning-pill>
                </template>
            </lightning-pill-container>
        </div>
    </template>

    <!-- Filter toggles -->
    <template if:true={showObjectFilter}>
        <div class="slds-var-m-bottom_small">
            <lightning-input
                type="checkbox"
                label={objectFilterLabel}
                checked={hideNoiseObjects}
                onchange={handleObjectFilterToggle}
                variant="label-inline">
            </lightning-input>
        </div>
    </template>
    <template if:true={showFlowFilter}>
        <div class="slds-var-m-bottom_small">
            <lightning-input
                type="checkbox"
                label={flowFilterLabel}
                checked={activeFlowsOnly}
                onchange={handleFlowFilterToggle}
                variant="label-inline">
            </lightning-input>
        </div>
    </template>
</template>
