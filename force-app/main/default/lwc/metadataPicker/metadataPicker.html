<template>
    <div class="slds-grid slds-wrap slds-gutters_small slds-m-bottom_medium">
        <!-- Metadata Type -->
        <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
            <lightning-combobox
                label="Metadata Type"
                value={metadataType}
                options={metadataTypeOptions}
                placeholder="Select type..."
                onchange={handleMetadataTypeChange}>
            </lightning-combobox>
        </div>

        <!-- Object picker (for fields) -->
        <template if:true={showObjectPicker}>
            <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
                <lightning-combobox
                    label="Object"
                    value={selectedObject}
                    options={objectOptions}
                    placeholder="Select object..."
                    onchange={handleObjectChange}>
                </lightning-combobox>
            </div>
        </template>

        <!-- Apex Class search-as-you-type -->
        <template if:true={showApexSearch}>
            <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
                <lightning-input
                    type="search"
                    label="Search Apex Classes"
                    value={apexSearchTerm}
                    placeholder="Type to search..."
                    onchange={handleApexSearchChange}>
                </lightning-input>
            </div>
            <div class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12">
                <lightning-combobox
                    label="Apex Class"
                    value={selectedComponent}
                    options={componentOptions}
                    placeholder="Select class..."
                    onchange={handleComponentChange}>
                </lightning-combobox>
            </div>
        </template>

        <!-- Component picker (non-Apex types) -->
        <template if:true={showComponentPickerNonApex}>
            <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12">
                <lightning-combobox
                    label={componentLabel}
                    value={selectedComponent}
                    options={componentOptions}
                    placeholder="Select..."
                    onchange={handleComponentChange}>
                </lightning-combobox>
            </div>
        </template>

        <!-- Search button -->
        <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-12 slds-grid slds-grid_vertical-align-end">
            <lightning-button
                variant="brand"
                label="Find Usages"
                icon-name="utility:search"
                disabled={isSearchDisabled}
                onclick={handleSearch}
                class="slds-m-top_medium">
            </lightning-button>
        </div>
    </div>

    <!-- Recent searches -->
    <template if:true={hasRecentSearches}>
        <div class="slds-m-bottom_small">
            <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_xx-small">
                <span class="slds-text-title_caps slds-grow">Recent Searches</span>
                <lightning-button-icon
                    icon-name="utility:delete"
                    alternative-text="Clear recent"
                    size="small"
                    onclick={handleClearRecent}>
                </lightning-button-icon>
            </div>
            <lightning-pill-container>
                <template for:each={recentSearches} for:item="recent">
                    <lightning-pill
                        key={recent.key}
                        label={recent.label}
                        data-key={recent.key}
                        onclick={handleRecentSearchClick}>
                    </lightning-pill>
                </template>
            </lightning-pill-container>
        </div>
    </template>

    <!-- Filter toggles -->
    <template if:true={showObjectFilter}>
        <div class="slds-m-bottom_small">
            <lightning-input
                type="checkbox"
                label={objectFilterLabel}
                checked={hideNoiseObjects}
                onchange={handleObjectFilterToggle}
                variant="label-inline">
            </lightning-input>
        </div>
    </template>
    <template if:true={showFlowFilter}>
        <div class="slds-m-bottom_small">
            <lightning-input
                type="checkbox"
                label={flowFilterLabel}
                checked={activeFlowsOnly}
                onchange={handleFlowFilterToggle}
                variant="label-inline">
            </lightning-input>
        </div>
    </template>
</template>
